openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: VPN Control Panel API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: VPN user management
  - name: profiles
    description: VPN profile management
  - name: server
    description: Xray server management
  - name: speedtest
    description: Speed testing
  - name: cluster
    description: Server cluster management
  - name: monitoring
    description: Node monitoring and auto-switch
  - name: routing
    description: Routing rules and whitelist bypass
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user info
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /server/status:
    get:
      operationId: getServerStatus
      tags: [server]
      summary: Get Xray server status
      responses:
        "200":
          description: Server status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerStatus"
  /server/restart:
    post:
      operationId: restartServer
      tags: [server]
      summary: Restart Xray server
      responses:
        "200":
          description: Restart result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /server/config:
    get:
      operationId: getServerConfig
      tags: [server]
      summary: Get current server config
      responses:
        "200":
          description: Server config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerConfig"
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all VPN users
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VpnUser"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new VPN user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpnUser"
  /users/{id}:
    put:
      operationId: updateUser
      tags: [users]
      summary: Update a VPN user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpnUser"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a VPN user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: User deleted
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /users/{id}/block:
    post:
      operationId: blockUser
      tags: [users]
      summary: Block a VPN user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User blocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpnUser"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /users/{id}/unblock:
    post:
      operationId: unblockUser
      tags: [users]
      summary: Unblock a VPN user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User unblocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpnUser"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /users/{id}/qr:
    get:
      operationId: getUserQr
      tags: [users]
      summary: Get user VLESS URL QR code
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: QR code data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QrResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /users/{id}/vless-url:
    get:
      operationId: getUserVlessUrl
      tags: [users]
      summary: Get user VLESS connection URL
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: VLESS URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VlessUrlResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /profiles:
    get:
      operationId: listProfiles
      tags: [profiles]
      summary: List all VPN profiles
      responses:
        "200":
          description: Profile list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VpnProfile"
    post:
      operationId: createProfile
      tags: [profiles]
      summary: Create a VPN profile manually
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProfileRequest"
      responses:
        "201":
          description: Profile created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpnProfile"
  /profiles/import-url:
    post:
      operationId: importProfileUrl
      tags: [profiles]
      summary: Import profile from VLESS URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportUrlRequest"
      responses:
        "201":
          description: Profile imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpnProfile"
        "400":
          description: Invalid URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /profiles/import-sub:
    post:
      operationId: importProfileSub
      tags: [profiles]
      summary: Import profiles from subscription URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportSubRequest"
      responses:
        "200":
          description: Profiles from subscription
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VpnProfile"
        "400":
          description: Invalid subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /profiles/{id}:
    put:
      operationId: updateProfile
      tags: [profiles]
      summary: Update a VPN profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpnProfile"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProfile
      tags: [profiles]
      summary: Delete a VPN profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Profile deleted
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /profiles/{id}/activate:
    post:
      operationId: activateProfile
      tags: [profiles]
      summary: Activate a VPN profile as outbound
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Profile activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpnProfile"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /profiles/{id}/ping:
    get:
      operationId: pingProfile
      tags: [profiles]
      summary: Ping a VPN profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ping result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResult"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /anti-dpi/settings:
    get:
      operationId: getAntiDpiSettings
      tags: [server]
      summary: Get global Anti-DPI settings
      responses:
        "200":
          description: Anti-DPI settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AntiDpiSettings"
    put:
      operationId: updateAntiDpiSettings
      tags: [server]
      summary: Update global Anti-DPI settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAntiDpiSettingsRequest"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AntiDpiSettings"
  /anti-dpi/transport-fallback/{id}:
    post:
      operationId: triggerTransportFallback
      tags: [server]
      summary: Trigger transport fallback for a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transport switched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransportFallbackResult"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /anti-dpi/rotate-fingerprint/{id}:
    post:
      operationId: rotateFingerprint
      tags: [server]
      summary: Manually rotate fingerprint for a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Fingerprint rotated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FingerprintRotationResult"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /anti-dpi/xray-config/{id}:
    get:
      operationId: getXrayConfig
      tags: [server]
      summary: Get generated Xray config for a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Xray config JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/XrayConfigResponse"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /speedtest/run:
    post:
      operationId: runSpeedtest
      tags: [speedtest]
      summary: Test all profiles
      responses:
        "200":
          description: Speedtest results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SpeedtestResult"
  /speedtest/auto-select:
    post:
      operationId: autoSelectProfile
      tags: [speedtest]
      summary: Auto-select best profile
      responses:
        "200":
          description: Auto-select result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoSelectResult"
  /monitoring/settings:
    get:
      operationId: getMonitoringSettings
      tags: [monitoring]
      summary: Get monitoring settings
      responses:
        "200":
          description: Current monitoring settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitoringSettingsResponse"
    put:
      operationId: updateMonitoringSettings
      tags: [monitoring]
      summary: Update monitoring settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMonitoringSettingsRequest"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitoringSettingsResponse"
  /monitoring/status:
    get:
      operationId: getMonitoringStatus
      tags: [monitoring]
      summary: Get monitoring loop status
      responses:
        "200":
          description: Monitoring status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitoringStatusResponse"
  /monitoring/start:
    post:
      operationId: startMonitoring
      tags: [monitoring]
      summary: Start the monitoring loop
      responses:
        "200":
          description: Monitoring started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /monitoring/stop:
    post:
      operationId: stopMonitoring
      tags: [monitoring]
      summary: Stop the monitoring loop
      responses:
        "200":
          description: Monitoring stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /monitoring/events:
    get:
      operationId: getMonitoringEvents
      tags: [monitoring]
      summary: Get auto-switch event log
      responses:
        "200":
          description: Event log
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SwitchEvent"
  /routing/rules:
    get:
      operationId: getRoutingRules
      tags: [routing]
      summary: List all routing rules
      responses:
        "200":
          description: Routing rules list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoutingRule"
    post:
      operationId: createRoutingRule
      tags: [routing]
      summary: Create a routing rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoutingRuleCreate"
      responses:
        "201":
          description: Created rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutingRule"
  /routing/rules/batch:
    post:
      operationId: batchImportRules
      tags: [routing]
      summary: Batch import routing rules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoutingBatchImport"
      responses:
        "201":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"
  /routing/rules/{id}:
    put:
      operationId: updateRoutingRule
      tags: [routing]
      summary: Update a routing rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoutingRuleUpdate"
      responses:
        "200":
          description: Updated rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutingRule"
    delete:
      operationId: deleteRoutingRule
      tags: [routing]
      summary: Delete a routing rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rule deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /routing/rules/{id}/toggle:
    post:
      operationId: toggleRoutingRule
      tags: [routing]
      summary: Toggle a routing rule on/off
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Toggled rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutingRule"
  /routing/rules/category/{category}:
    delete:
      operationId: deleteRulesByCategory
      tags: [routing]
      summary: Delete all rules in a category
      parameters:
        - name: category
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deletion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCategoryResult"
  /routing/presets:
    get:
      operationId: getRoutingPresets
      tags: [routing]
      summary: List available presets
      responses:
        "200":
          description: Preset list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoutingPreset"
  /routing/presets/{presetId}/import:
    post:
      operationId: importRoutingPreset
      tags: [routing]
      summary: Import a preset
      parameters:
        - name: presetId
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresetImportResult"
  /routing/export:
    get:
      operationId: exportRoutingRules
      tags: [routing]
      summary: Export all routing rules
      responses:
        "200":
          description: Exported rules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutingExport"
  /routing/stats:
    get:
      operationId: getRoutingStats
      tags: [routing]
      summary: Get routing rules statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutingStats"
  /traffic/stats:
    get:
      operationId: getTrafficStats
      tags: [server]
      summary: Get traffic statistics for last 24 hours
      responses:
        "200":
          description: Traffic data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrafficStats"
  /cluster/servers:
    get:
      operationId: listServers
      tags: [cluster]
      summary: List all servers in cluster
      responses:
        "200":
          description: Server list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VpnServer"
    post:
      operationId: createServer
      tags: [cluster]
      summary: Add server to cluster
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServerRequest"
      responses:
        "201":
          description: Server created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpnServer"
  /cluster/servers/{id}:
    put:
      operationId: updateServer
      tags: [cluster]
      summary: Update server details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateServerRequest"
      responses:
        "200":
          description: Server updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpnServer"
    delete:
      operationId: deleteServer
      tags: [cluster]
      summary: Remove server from cluster
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Server deleted
  /cluster/servers/{id}/ping:
    get:
      operationId: pingServer
      tags: [cluster]
      summary: Ping a server
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ping result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpnServer"
  /cluster/servers/{id}/set-primary:
    post:
      operationId: setPrimaryServer
      tags: [cluster]
      summary: Set server as primary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Primary set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpnServer"
  /cluster/stats:
    get:
      operationId: getClusterStats
      tags: [cluster]
      summary: Get cluster statistics
      responses:
        "200":
          description: Cluster stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterStats"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password
    LoginResponse:
      type: object
      properties:
        token:
          type: string
        username:
          type: string
      required:
        - token
        - username
    MeResponse:
      type: object
      properties:
        username:
          type: string
      required:
        - username
    ServerStatus:
      type: object
      properties:
        running:
          type: boolean
        uptime:
          type: string
        version:
          type: string
        activeOutbound:
          type: ["string", "null"]
        connectedClients:
          type: integer
        currentPing:
          type: ["integer", "null"]
      required:
        - running
        - uptime
        - version
        - activeOutbound
        - connectedClients
        - currentPing
    ServerConfig:
      type: object
      properties:
        officeIp:
          type: string
        officePort:
          type: string
        officeSni:
          type: string
        autoSwitch:
          type: boolean
        autoSwitchInterval:
          type: integer
        autoSwitchThreshold:
          type: integer
      required:
        - officeIp
        - officePort
        - officeSni
        - autoSwitch
        - autoSwitchInterval
        - autoSwitchThreshold
    VpnUser:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        uuid:
          type: string
        flow:
          type: string
        trafficLimit:
          type: number
        trafficUsed:
          type: number
        status:
          type: string
        expiresAt:
          type: ["string", "null"]
